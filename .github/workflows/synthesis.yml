name: Chronos Sentinel Synthesis

on:
  schedule:
    # Run every 30 minutes to stay within Gemini free-tier limits (PRAXIS)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  cluster-and-compare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install
        
      - name: Execute Layer C, D (Synthesis) and E (Archive)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run layer:cde
        
      - name: Commit and Push Clusters, Archive and Public Surfaces
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/latest/clusters.json public/data/latest/impact.json public/data/archive/ public/api/v1/ public/feeds/ public/embed/ || true
          git commit -m "Auto-update: Synthesized Clusters, Impact Events, API, RSS, and Embeds" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
